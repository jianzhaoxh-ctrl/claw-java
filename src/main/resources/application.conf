# ClawDesktop 配置文件
# ConfigLoader 读取根级别键（支持 apiKey / api-key / apikey 三种写法）

gateway {
  port = 7180
  ws-port = 7181
  bind-address = "127.0.0.1"
  cors-enabled = true
}

agent {
  id = "default"
  name = "ClawDesktop"
  model-id = "qwen-turbo"
  system-prompt = "You are ClawDesktop, a helpful personal AI assistant running on the desktop. 你是一个有用的AI助手，可以用中文回答问题。"
  reasoning-level = "off"
  max-tokens = 4096
  temperature = 0.7
}

llm {
  default-provider = "qwen"

  providers {
    openai {
      apikey = ""
      base-url = "https://api.openai.com/v1"
    }
    anthropic {
      apikey = ""
      base-url = "https://api.anthropic.com"
    }
    deepseek {
      apikey = ""
      base-url = "https://api.deepseek.com/v1"
    }
    qwen {
      # 通义千问 API Key — 也可通过环境变量 CLAW_LLM_PROVIDERS_QWEN_APIKEY 设置
      apikey = ""
      base-url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
    }
    ollama {
      base-url = "http://localhost:11434"
    }
  }
}

memory {
  db-path = "${user.home}/.clawdesktop/memory.db"
  embedding-enabled = false
}
