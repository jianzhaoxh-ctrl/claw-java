claw {
  name = "ClawDesktop"
  version = "0.1.0"
  data-dir = "${user.home}/.clawdesktop"

  gateway {
    port = 7180
    ws-port = 7181
    bind-address = "127.0.0.1"
    cors-enabled = true
  }

  agent {
    id = "default"
    name = "ClawDesktop"
    model-id = "ollama/llama3"
    system-prompt = "You are ClawDesktop, a helpful personal AI assistant running on the desktop."
    reasoning-level = "off"
    max-tokens = 4096
    temperature = 0.7
  }

  llm {
    default-provider = "ollama"

    providers {
      openai {
        api-key = ""
        base-url = "https://api.openai.com/v1"
      }
      anthropic {
        api-key = ""
        base-url = "https://api.anthropic.com"
      }
      deepseek {
        api-key = ""
        base-url = "https://api.deepseek.com/v1"
      }
      ollama {
        base-url = "http://localhost:11434"
      }
    }
  }

  memory {
    db-path = "data/memory/claw.db"
    embedding-enabled = false
    embedding-model = "text-embedding-3-small"
  }
}
